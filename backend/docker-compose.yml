services:
  demirkiran-backend:
    image: dmrkrnn/demirkiran-backend:latest
    container_name: demirkiran-backend
    ports:
      - "3000:3000/tcp" # WebServer & Socket.IO
      - "40000-40100:40000-40100/udp" # Mediasoup RTP (UDP range)
    env_file: .env
    volumes:
      - ./cookies.txt:/app/cookies.txt # YouTube bot bypass için cookie dosyası (yt-dlp güncelleyebilsin diye rw lazim)
    restart: unless-stopped
